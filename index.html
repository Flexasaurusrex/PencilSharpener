<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bg: #f5efe6;
    --desk: #e8ddd0;
    --shadow: rgba(100,70,40,0.18);
    --accent: #ff6b35;
    --sharpener-body: #2d2d2d;
    --sharpener-trim: #e63946;
    --text: #3a2a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--text);
    margin-top: 28px;
    letter-spacing: 1px;
    text-shadow: 3px 3px 0 rgba(255,107,53,0.25);
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.95rem;
    color: #8a7060;
    margin-top: 4px;
    font-weight: 600;
  }

  .desk {
    width: min(700px, 98vw);
    background: linear-gradient(180deg, #ede5d8 0%, #ddd0bf 100%);
    border-radius: 28px;
    box-shadow: 0 12px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.6);
    padding: 28px 24px 24px;
    margin: 24px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  /* PENCIL TRAY */
  .tray-label {
    font-family: 'Fredoka One', cursive;
    color: #8a7060;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    align-self: flex-start;
    margin-left: 4px;
  }

  .pencil-tray {
    width: 100%;
    background: linear-gradient(180deg, #c9bfb2 0%, #b8ad9f 100%);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.12), 0 2px 0 rgba(255,255,255,0.4);
    min-height: 80px;
  }

  .new-pencil-btn {
    align-self: center;
    background: linear-gradient(135deg, #ff6b35, #ff9f1c);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(255,107,53,0.4), 0 2px 0 #c94a10;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }
  .new-pencil-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(255,107,53,0.45), 0 2px 0 #c94a10; }
  .new-pencil-btn:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(255,107,53,0.3), 0 1px 0 #c94a10; }

  /* MAIN AREA */
  .main-area {
    display: flex;
    gap: 28px;
    width: 100%;
    align-items: flex-end;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* SHARPENER */
  .sharpener-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .sharpener-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    cursor: pointer;
    user-select: none;
  }
  .sharpener-wrap:hover svg .sharpener-body { filter: brightness(1.08); }

  .sharpener-wrap.shaking {
    animation: shakerino 0.08s linear infinite;
  }
  @keyframes shakerino {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(-3px,2px) rotate(-1.5deg); }
    50%  { transform: translate(3px,-2px) rotate(1.5deg); }
    75%  { transform: translate(-2px,3px) rotate(-1deg); }
    100% { transform: translate(2px,-1px) rotate(1deg); }
  }

  .sharpener-hint {
    font-size: 0.78rem;
    font-weight: 700;
    color: #8a7060;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* PENCIL STAGE */
  .pencil-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 200px;
  }

  .stage-label {
    font-family: 'Fredoka One', cursive;
    color: #a0907e;
    font-size: 0.82rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .pencil-holder {
    width: 100%;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #d9cfbf, #ccc0ad);
    border-radius: 14px;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.1);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .pencil-holder svg {
    cursor: pointer;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
    transition: transform 0.15s;
  }
  .pencil-holder svg:hover { transform: scale(1.04); }
  .pencil-holder svg.placed { cursor: default; }
  .pencil-holder svg.placed:hover { transform: none; }

  .drop-hint {
    color: #b0a090;
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    pointer-events: none;
  }

  /* sharpener button */
  .sharpen-btn {
    background: linear-gradient(135deg, #e63946, #c1121f);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 11px 32px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(230,57,70,0.4), 0 2px 0 #8b0000;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    letter-spacing: 0.5px;
  }
  .sharpen-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
  .sharpen-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230,57,70,0.45), 0 2px 0 #8b0000; }
  .sharpen-btn:not(:disabled):active { transform: translateY(1px); }
  .sharpen-btn.pressing { transform: translateY(2px) scale(0.97); box-shadow: 0 2px 8px rgba(230,57,70,0.3), 0 1px 0 #8b0000 !important; }

  .collect-btn {
    background: linear-gradient(135deg, #f9c74f, #f8961e);
    color: #3a2a1a;
    border: none;
    border-radius: 50px;
    padding: 11px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(249,199,79,0.5), 0 2px 0 #b8720a;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
    animation: collectPulse 0.8s ease-in-out infinite alternate;
  }
  @keyframes collectPulse {
    from { box-shadow: 0 4px 16px rgba(249,199,79,0.4), 0 2px 0 #b8720a; transform: scale(1); }
    to   { box-shadow: 0 6px 24px rgba(249,199,79,0.8), 0 2px 0 #b8720a; transform: scale(1.04); }
  }
  .collect-btn:hover { transform: translateY(-2px) scale(1.05) !important; }
  .collect-btn:active { transform: translateY(1px) scale(0.97) !important; }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    width: 100%;
    background: #c9bfb2;
    border-radius: 20px;
    height: 14px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #ff9f1c);
    border-radius: 20px;
    transition: width 0.1s linear;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* shavings */
  .shavings-container {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    pointer-events: none;
    overflow: hidden;
  }
  .shaving {
    position: absolute;
    bottom: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: fall 0.7s ease-out forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(10px) rotate(360deg); opacity: 0; }
  }

  /* COLLECTION */
  .collection-zone {
    width: 100%;
  }
  .collection-label {
    font-family: 'Fredoka One', cursive;
    color: #8a7060;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .coll-count {
    background: var(--accent);
    color: white;
    border-radius: 50px;
    padding: 1px 9px;
    font-size: 0.8rem;
  }

  .collection-shelf {
    background: linear-gradient(180deg, #c9bfb2 0%, #b8ad9f 100%);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    min-height: 70px;
    align-items: flex-end;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.12), 0 2px 0 rgba(255,255,255,0.4);
  }

  .coll-pencil {
    cursor: pointer;
    transition: transform 0.15s;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.2));
  }
  .coll-pencil:hover { transform: translateY(-4px) rotate(-5deg); }

  .empty-coll {
    color: #a89880;
    font-size: 0.85rem;
    font-weight: 600;
    text-align: center;
    width: 100%;
    padding: 10px 0;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: #2d2d2d;
    color: white;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    white-space: nowrap;
  }

  /* status msg */
  .status-msg {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--accent);
    min-height: 1.5em;
    text-align: center;
    letter-spacing: 0.5px;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    0% { transform: scale(0.7); opacity:0; }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); opacity:1; }
  }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(180px) rotate(720deg); }
  }

  /* pencil in tray row */
  .tray-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tray-pencil {
    cursor: pointer;
    transition: transform 0.15s;
    filter: drop-shadow(1px 3px 4px rgba(0,0,0,0.2));
  }
  .tray-pencil:hover { transform: translateY(-3px); }
  .tray-pencil.selected { filter: drop-shadow(0 0 8px gold) drop-shadow(1px 3px 4px rgba(0,0,0,0.2)); }

  /* sparkle */
  .sparkle {
    position: fixed;
    pointer-events: none;
    z-index: 300;
    font-size: 1.2rem;
    animation: sparklePop 0.6s ease-out forwards;
  }
  @keyframes sparklePop {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.4) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }
</style>

<body>

<h1>✏️ <span>Sharpen</span> It!</h1>
<p class="subtitle">click a pencil → place it → sharpen away!</p>

<div class="desk">

  <div class="collection-zone">

<div class="tooltip" id="tooltip"></div>

<script>
// ── Audio ──────────────────────────────────────────────────────────────────
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function resumeCtx() { if (ctx.state === 'suspended') ctx.resume(); }

function playMotor(duration = 1.0) {
  resumeCtx();
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();

  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(95, ctx.currentTime + 0.2);
  osc2.type = 'square'; osc2.frequency.setValueAtTime(155, ctx.currentTime);
  lfo.type = 'sine'; lfo.frequency.setValueAtTime(12, ctx.currentTime);
  lfoGain.gain.setValueAtTime(15, ctx.currentTime);

  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  osc.connect(gain); osc2.connect(gain);
  gain.connect(ctx.destination);

  gain.gain.setValueAtTime(0.18, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

  osc.start(); osc2.start(); lfo.start();
  osc.stop(ctx.currentTime + duration);
  osc2.stop(ctx.currentTime + duration);
  lfo.stop(ctx.currentTime + duration);
}

function playDone() {
  resumeCtx();
  [523, 659, 784].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(f, ctx.currentTime + i*0.12);
    g.gain.setValueAtTime(0.25, ctx.currentTime + i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.35);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i*0.12);
    osc.stop(ctx.currentTime + i*0.12 + 0.4);
  });
}

function playClick() {
  resumeCtx();
  const buf = ctx.createBuffer(1, 2048, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < 2048; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/2048, 8);
  const src = ctx.createBufferSource();
  const g = ctx.createGain(); g.gain.setValueAtTime(0.3, ctx.currentTime);
  src.buffer = buf; src.connect(g); g.connect(ctx.destination);
  src.start();
}

function playPop() {
  resumeCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
  g.gain.setValueAtTime(0.3, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.15);
}

// ── Pencil Data ─────────────────────────────────────────────────────────────
const PENCIL_DESIGNS = [
  // ── Originals ──
  { name: "Classic #2",      body:"#f5c518", accent:"#2d2d2d", ferrule:"#c0a080", eraser:"#ffb3ba", pattern:null },
  { name: "Firestarter",     body:"#e63946", accent:"#fff",    ferrule:"#888",    eraser:"#ffd6d6", pattern:null },
  { name: "Ocean Blue",      body:"#1d7bd7", accent:"#fff",    ferrule:"#aad4f5", eraser:"#d0eeff", pattern:null },
  { name: "Midnight",        body:"#1a1a2e", accent:"#e94560", ferrule:"#555",    eraser:"#e94560", pattern:null },
  { name: "Lime Zap",        body:"#aacc00", accent:"#1a1a00", ferrule:"#c8b400", eraser:"#f0ff80", pattern:null },
  { name: "Cotton Candy",    body:"#ff70a6", accent:"#fff",    ferrule:"#ffb3d4", eraser:"#fff0f8", pattern:null },
  { name: "Galaxy",          body:"#3d1a78", accent:"#e0aaff", ferrule:"#9b5de5", eraser:"#c77dff", pattern:null },
  { name: "Forest",          body:"#2d6a4f", accent:"#d8f3dc", ferrule:"#b7e4c7", eraser:"#d8f3dc", pattern:null },
  { name: "Sunset",          body:"#ff9f1c", accent:"#fff",    ferrule:"#ffbf69", eraser:"#fff3cd", pattern:null },
  { name: "Stealth",         body:"#444",    accent:"#e0e0e0", ferrule:"#888",    eraser:"#666",    pattern:null },
  { name: "Cherry Blossom",  body:"#ffb7c5", accent:"#8b3a52", ferrule:"#f7c9d5", eraser:"#ffe4ec", pattern:null },
  { name: "Toxic",           body:"#39ff14", accent:"#1a1a1a", ferrule:"#a8ff50", eraser:"#ccff88", pattern:null },
  { name: "Retro Wood",      body:"#c68642", accent:"#fff8ee", ferrule:"#8b5e3c", eraser:"#d4a574", pattern:null },
  { name: "Ice Queen",       body:"#caf0f8", accent:"#0077b6", ferrule:"#ade8f4", eraser:"#e0f7fa", pattern:null },

function makePencilId() { return ++pencilIdCounter; }

function addRandomPencil() {
  playClick();
  const design = PENCIL_DESIGNS[Math.floor(Math.random() * PENCIL_DESIGNS.length)];
  const p = { id: makePencilId(), design, length: 1.0 };
  trayPencils.push(p);
  renderTray();
  spawnSparkle();
  setStatus(`✨ Got a ${design.name}!`);

// ── SVG Drawing ──────────────────────────────────────────────────────────────
let _defCounter = 0;
function uid() { return 'pd' + (++_defCounter); }

function ns(tag) { return document.createElementNS("http://www.w3.org/2000/svg", tag); }
function attr(el, obj) { for (const k in obj) el.setAttribute(k, obj[k]); return el; }

function drawPencil(design, length, w, h, isStub = false) {
  const fullW = w;
  const pencilW = Math.max(fullW * length, isStub ? fullW * 0.25 : fullW * 0.3);
  const bodyH = h * 0.38;
  const tipLen = Math.min(h * 0.22, pencilW * 0.35);
  const ferruleW = h * 0.13;
  const eraserW = h * 0.11;
  const bodyY = (h - bodyH) / 2;

  const eraserX = 4;
  const ferruleX = eraserX + eraserW;
  const bodyX = ferruleX + ferruleW;
  const bodyW = pencilW - tipLen;
  const tipBaseX = bodyX + bodyW;
  const tipEndX = bodyX + pencilW;
  const clipId = uid();

  const svg = ns("svg");
  attr(svg, { width: fullW, height: h, viewBox: `0 0 ${fullW} ${h}` });

  // defs for clip, patterns, gradients
  const defs = ns("defs");
  svg.appendChild(defs);

  // clip path to constrain patterns to body rect
  const clip = ns("clipPath"); clip.setAttribute("id", clipId);
  const clipRect = ns("rect");
  attr(clipRect, { x: bodyX, y: bodyY, width: bodyW, height: bodyH });
  clip.appendChild(clipRect); defs.appendChild(clip);

  // ── ERASER ──
  attr(ns("rect"), { x: eraserX, y: bodyY, width: eraserW, height: bodyH, rx: 3, fill: design.eraser });
  const er = ns("rect");
  attr(er, { x: eraserX, y: bodyY, width: eraserW, height: bodyH, rx: 3, fill: design.eraser });
  svg.appendChild(er);

  // ── FERRULE ──
  const fe = ns("rect");
  attr(fe, { x: ferruleX, y: bodyY, width: ferruleW, height: bodyH, fill: design.ferrule });
  svg.appendChild(fe);
  for (let i = 1; i <= 2; i++) {
    const fl = ns("line");
    attr(fl, { x1: ferruleX + i*(ferruleW/3), y1: bodyY, x2: ferruleX + i*(ferruleW/3), y2: bodyY+bodyH, stroke: "rgba(0,0,0,0.15)", "stroke-width": 1 });
    svg.appendChild(fl);
  }

  // ── BODY BASE ──
  const bo = ns("rect");
  attr(bo, { x: bodyX, y: bodyY, width: bodyW, height: bodyH, fill: design.body });
  svg.appendChild(bo);

  // ── PATTERN OVERLAY ──
  const g = ns("g"); g.setAttribute("clip-path", `url(#${clipId})`);
  svg.appendChild(g);

  const p = design.pattern;
  const bx = bodyX, by = bodyY, bw = bodyW, bh = bodyH;

  if (p === 'tiedye') {
    const colors = ["#ff595e","#ffca3a","#6a4c93","#1982c4","#8ac926","#ff70a6","#f9c74f"];
    for (let i = 0; i < 14; i++) {
      const cx = bx + Math.random()*bw, cy = by + Math.random()*bh;
      const r = 4 + Math.random()*16;
      const c = ns("circle");
      attr(c, { cx, cy, r, fill: colors[i%colors.length], opacity: 0.55 });
      g.appendChild(c);
    }
    for (let i = 0; i < 6; i++) {
      const cx = bx + Math.random()*bw, cy = by + Math.random()*bh;
      for (let j = 2; j <= 8; j+=2) {
        const ring = ns("circle");
        attr(ring, { cx, cy, r: j*2, fill: "none", stroke: colors[(i+j)%colors.length], "stroke-width": 1.5, opacity: 0.5 });
        g.appendChild(ring);
      }
    }

  } else if (p === 'cosmic') {
    const gradId = uid();
    const grad = ns("linearGradient");
    attr(grad, { id: gradId, x1:"0%", y1:"0%", x2:"100%", y2:"100%" });
    [["0%","#0d0d2b"],["50%","#240046"],["100%","#03045e"]].forEach(([o,c]) => {
      const stop = ns("stop"); attr(stop, { offset: o, "stop-color": c }); grad.appendChild(stop);
    });
    defs.appendChild(grad);
    const bg = ns("rect"); attr(bg, { x:bx, y:by, width:bw, height:bh, fill:`url(#${gradId})` }); g.appendChild(bg);
    for (let i=0; i<28; i++) {
      const star = ns("circle");
      const r = Math.random() < 0.15 ? 1.5 : 0.7;
      attr(star, { cx: bx+Math.random()*bw, cy: by+Math.random()*bh, r, fill:"#fff", opacity: 0.4+Math.random()*0.6 });
      g.appendChild(star);
    }
    ["#f72585","#7209b7","#4361ee","#4cc9f0"].forEach((c,i) => {
      const neb = ns("ellipse");
      attr(neb, { cx: bx+bw*(0.2+i*0.2), cy: by+bh/2, rx:8+Math.random()*10, ry:5+Math.random()*6, fill:c, opacity:0.18 });
      g.appendChild(neb);
    });

  } else if (p === 'naked') {
    // PG-13 pin-up silhouette — curvy hourglass shape, tastefully abstract
    const cx = bx + bw*0.5, cy = by + bh*0.5;
    // skin gradient
    const gId = uid();
    const sg = ns("linearGradient"); attr(sg, { id: gId, x1:"0%", y1:"0%", x2:"0%", y2:"100%" }); defs.appendChild(sg);
    [["0%","#ffd8b1"],["100%","#ffad7a"]].forEach(([o,c]) => { const s=ns("stop"); attr(s,{offset:o,"stop-color":c}); sg.appendChild(s); });
    // hourglass silhouette (abstract)
    const fig = ns("path");
    const s = bh*0.42;
    fig.setAttribute("d", `M${cx-s*0.28},${by+1} Q${cx+s*0.55},${cy-s*0.1} ${cx+s*0.18},${cy} Q${cx+s*0.55},${cy+s*0.1} ${cx-s*0.28},${by+bh-1} Q${cx-s*0.65},${cy+s*0.15} ${cx-s*0.22},${cy} Q${cx-s*0.65},${cy-s*0.15} ${cx-s*0.28},${by+1} Z`);
    attr(fig, { fill: `url(#${gId})`, opacity: 0.85 });
    g.appendChild(fig);
    // hair
    const hair = ns("ellipse");
    attr(hair, { cx, cy: by+bh*0.18, rx: s*0.22, ry: bh*0.22, fill: "#8b4513", opacity: 0.9 });
    g.appendChild(hair);
    // tiny face dots
    [[-s*0.06,-s*0.03],[s*0.06,-s*0.03]].forEach(([dx,dy]) => {
      const eye = ns("circle"); attr(eye, { cx: cx+dx, cy: cy*0.62+by*0.38+dy, r:1.2, fill:"#333" }); g.appendChild(eye);
    });
    // "censored" bar because lol
    const bar = ns("rect"); attr(bar, { x:bx+bw*0.2, y:cy-2, width:bw*0.6, height:5, fill:"#000", opacity:0.7, rx:2 }); g.appendChild(bar);
    const txt2 = ns("text"); attr(txt2, { x:bx+bw*0.5, y:cy+2, "text-anchor":"middle", "font-family":"Nunito,sans-serif", "font-weight":"900", "font-size":"4", fill:"#fff" }); txt2.textContent="CENSORED"; g.appendChild(txt2);

  } else if (p === 'emoji') {
    // repeating emoji text
    const emj = design.emoji || "😂";
    for (let col=0; col < Math.ceil(bw/14)+1; col++) {
      const et = ns("text");
      attr(et, { x: bx+col*14, y: by+bh*0.72, "font-size": bh*0.85, opacity: 0.88 });
      et.textContent = emj; g.appendChild(et);
    }

  } else if (p === 'zebra') {
    // alternating black/white diagonal stripes
    for (let i=-2; i < bw/6+2; i++) {
      const stripe = ns("rect");
      attr(stripe, { x: bx+i*12-4, y: by-2, width:6, height:bh+4, fill: i%2===0?"#1a1a1a":"#f0f0f0",
        transform: `rotate(-20 ${bx+i*12} ${by+bh/2})` });
      g.appendChild(stripe);
    }

  } else if (p === 'camo') {
    const cColors = ["#606c38","#3d4a20","#a4b872","#8a9a50","#4a5220"];
    for (let i=0; i<16; i++) {
      const blob = ns("ellipse");
      attr(blob, { cx: bx+Math.random()*bw, cy: by+Math.random()*bh,
        rx: 3+Math.random()*9, ry: 2+Math.random()*5,
        fill: cColors[Math.floor(Math.random()*cColors.length)],
        transform: `rotate(${Math.random()*180} ${bx+bw/2} ${by+bh/2})` });
      g.appendChild(blob);
    }

  } else if (p === 'flames') {
    const flameColors = ["#faa307","#e85d04","#dc2f02","#fff","#ffba08"];
    for (let i=0; i<8; i++) {
      const fx = bx + bw*0.1 + i*(bw*0.11);
      const flame = ns("path");
      const fh = bh * (0.5+Math.random()*0.5);
      flame.setAttribute("d",`M${fx},${by+bh} Q${fx-3},${by+bh-fh*0.6} ${fx},${by+bh-fh} Q${fx+3},${by+bh-fh*0.6} ${fx+4},${by+bh} Z`);
      attr(flame, { fill: flameColors[i%flameColors.length], opacity:0.85 });
      g.appendChild(flame);
    }

  } else if (p === 'hearts') {
    for (let i=0; i<7; i++) {
      const hx = bx + 8 + i * (bw/7);
      const hy = by + bh/2;
      const hs = bh * 0.32;
      const heart = ns("path");
      heart.setAttribute("d", `M${hx},${hy+hs*0.3} C${hx},${hy-hs*0.1} ${hx-hs},${hy-hs*0.1} ${hx-hs},${hy+hs*0.3} C${hx-hs},${hy+hs*0.7} ${hx},${hy+hs} ${hx},${hy+hs} C${hx},${hy+hs} ${hx+hs},${hy+hs*0.7} ${hx+hs},${hy+hs*0.3} C${hx+hs},${hy-hs*0.1} ${hx},${hy-hs*0.1} ${hx},${hy+hs*0.3} Z`);
      attr(heart, { fill:"#e63946", opacity: 0.5+Math.random()*0.4, transform:`rotate(${-20+Math.random()*40} ${hx} ${hy})` });
      g.appendChild(heart);
    }

  } else if (p === 'dots') {
    const dcols = ["#1565c0","#e91e63","#ff9800","#4caf50","#9c27b0","#00bcd4"];
    let di=0;
    for (let row=0; row<3; row++) for (let col=0; col<Math.ceil(bw/10)+1; col++) {
      const dot = ns("circle");
      attr(dot, { cx: bx+5+col*10+(row%2)*5, cy: by+bh*0.2+row*bh*0.3, r:3.5, fill:dcols[di++%dcols.length], opacity:0.75 });
      g.appendChild(dot);
    }

  } else if (p === 'rainbow') {
    const rColors = ["#FF0000","#FF7F00","#FFFF00","#00CC00","#0000FF","#8B00FF"];
    const stripeH = bh / rColors.length;
    rColors.forEach((c,i) => {
      const rs = ns("rect"); attr(rs, { x:bx, y:by+i*stripeH, width:bw, height:stripeH+0.5, fill:c, opacity:0.82 }); g.appendChild(rs);
    });

  } else if (p === 'glitch') {
    const glColors = ["#00ff41","#ff00ff","#00ffff","#ff3300","#ffff00"];
    for (let i=0; i<12; i++) {
      const sliceY = by + Math.random()*bh;
      const sliceH = 1 + Math.random()*4;
      const sliceX = bx + (Math.random()-0.5)*8;
      const gs = ns("rect");
      attr(gs, { x:sliceX, y:sliceY, width:bw, height:sliceH, fill:glColors[i%glColors.length], opacity:0.7 });
      g.appendChild(gs);
    }
    // scan lines
    for (let i=0; i<Math.floor(bh/3); i++) {
      const sl = ns("rect"); attr(sl, { x:bx, y:by+i*3, width:bw, height:1, fill:"#000", opacity:0.25 }); g.appendChild(sl);
    }

  } else if (p === 'bacon') {
    // wavy red/pink stripes
    for (let i=0; i<5; i++) {
      const wy = by + bh*(0.1+i*0.18);
      const bac = ns("path");
      let d = `M${bx} ${wy}`;
      for (let x=0; x<=bw; x+=8) { d += ` Q${bx+x+4} ${wy+(i%2===0?-4:4)} ${bx+x+8} ${wy}`; }
      attr(bac, { d, fill:"none", stroke: i%2===0?"#c0392b":"#f8bbd0", "stroke-width": 3.5, opacity:0.85 });
      g.appendChild(bac);
    }

  } else if (p === 'pizza') {
    // pepperoni circles + cheese bg
    const cheeseBg = ns("rect"); attr(cheeseBg, { x:bx, y:by, width:bw, height:bh, fill:"#f9e04b", opacity:0.6 }); g.appendChild(cheeseBg);
    for (let i=0; i<6; i++) {
      const pep = ns("circle");
      attr(pep, { cx: bx+10+i*(bw/6.5), cy: by+bh/2+(i%2===0?-2:2), r:4, fill:"#c0392b", opacity:0.85 });
      g.appendChild(pep);
    }

  } else if (p === 'eyeball') {
    for (let i=0; i<4; i++) {
      const ex = bx + 10 + i*(bw/4.2);
      const ey = by + bh/2;
      const eyeBall = ns("circle"); attr(eyeBall, { cx:ex, cy:ey, r:bh*0.38, fill:"#fff", stroke:"#ccc", "stroke-width":0.5 }); g.appendChild(eyeBall);
      const iris = ns("circle"); attr(iris, { cx:ex+1, cy:ey, r:bh*0.22, fill:"#1a8cff" }); g.appendChild(iris);
      const pupil = ns("circle"); attr(pupil, { cx:ex+1, cy:ey, r:bh*0.12, fill:"#1a1a1a" }); g.appendChild(pupil);
      const gleam = ns("circle"); attr(gleam, { cx:ex+2.5, cy:ey-2, r:1.5, fill:"#fff" }); g.appendChild(gleam);
      // lashes
      for (let l=0; l<5; l++) {
        const angle = -Math.PI*0.6 + l*(Math.PI*0.3);
        const lx1=ex+Math.cos(angle)*(bh*0.38), ly1=ey+Math.sin(angle)*(bh*0.38);
        const lx2=ex+Math.cos(angle)*(bh*0.52), ly2=ey+Math.sin(angle)*(bh*0.52);
        const lash=ns("line"); attr(lash,{x1:lx1,y1:ly1,x2:lx2,y2:ly2,stroke:"#1a1a1a","stroke-width":0.8}); g.appendChild(lash);
      }
    }

  } else if (p === 'money') {
    const mBg = ns("rect"); attr(mBg, { x:bx, y:by, width:bw, height:bh, fill:"#1a472a", opacity:0.5 }); g.appendChild(mBg);
    for (let i=0; i<3; i++) {
      const mt = ns("text");
      attr(mt, { x: bx+8+i*(bw*0.35), y: by+bh*0.72, "font-family":"serif", "font-weight":"900", "font-size": bh*0.7, fill:"#2ecc71", opacity:0.6 });
      mt.textContent = "$"; g.appendChild(mt);
    }
    // guilloche-ish lines
    for (let i=0; i<6; i++) {
      const ml = ns("line");
      attr(ml, { x1:bx+i*(bw/5), y1:by, x2:bx+(i+1)*(bw/5), y2:by+bh, stroke:"#27ae60", "stroke-width":0.7, opacity:0.4 });
      g.appendChild(ml);
    }

  } else if (p === 'lightning') {
    // dark bg, zigzag bolts
    const lBg = ns("rect"); attr(lBg, { x:bx, y:by, width:bw, height:bh, fill:"#0d0d1a" }); g.appendChild(lBg);
    for (let i=0; i<4; i++) {
      const lx = bx+8+i*(bw/4.5);
      const bolt = ns("path");
      bolt.setAttribute("d", `M${lx+3},${by+1} L${lx},${by+bh*0.48} L${lx+4},${by+bh*0.48} L${lx+1},${by+bh-1}`);
      attr(bolt, { fill:"none", stroke:"#ffe566", "stroke-width":2, "stroke-linejoin":"round", opacity:0.9 });
      g.appendChild(bolt);
    }

  } else if (p === 'holographic') {
    const hgId = uid();
    const hg = ns("linearGradient"); attr(hg, { id:hgId, x1:"0%", y1:"0%", x2:"100%", y2:"0%" }); defs.appendChild(hg);
    [["0%","#ff80ff"],["16%","#80ffff"],["33%","#80ff80"],["50%","#ffff80"],["66%","#ff8080"],["83%","#8080ff"],["100%","#ff80ff"]].forEach(([o,c]) => {
      const s=ns("stop"); attr(s,{offset:o,"stop-color":c,"stop-opacity":"0.7"}); hg.appendChild(s);
    });
    const hgR = ns("rect"); attr(hgR, { x:bx, y:by, width:bw, height:bh, fill:`url(#${hgId})` }); g.appendChild(hgR);
    for (let i=0; i<10; i++) {
      const hl = ns("line");
      attr(hl, { x1:bx, y1:by+i*(bh/9), x2:bx+bw, y2:by+i*(bh/9), stroke:"rgba(255,255,255,0.3)", "stroke-width":0.5 });
      g.appendChild(hl);
    }

  } else if (p === 'bee') {
    // yellow+black stripes
    const nbStripes = 5;
    const sw = bw / nbStripes;
    for (let i=0; i<nbStripes; i++) {
      const beeS = ns("rect"); attr(beeS, { x:bx+i*sw, y:by, width:sw, height:bh, fill:i%2===0?"#ffd60a":"#1a1a00" }); g.appendChild(beeS);
    }

  } else if (p === 'watermelon') {
    const wBg = ns("rect"); attr(wBg, { x:bx, y:by, width:bw, height:bh, fill:"#ff595e" }); g.appendChild(wBg);
    // rind strip at top
    const rind = ns("rect"); attr(rind, { x:bx, y:by, width:bw, height:bh*0.18, fill:"#8ac926" }); g.appendChild(rind);
    const white = ns("rect"); attr(white, { x:bx, y:by+bh*0.18, width:bw, height:bh*0.08, fill:"#e8f5e9" }); g.appendChild(white);
    // seeds
    for (let i=0; i<8; i++) {
      const seed = ns("ellipse");
      attr(seed, { cx:bx+8+i*(bw/8.5), cy:by+bh*0.6+(i%2===0?-3:3), rx:2, ry:3.5, fill:"#1a1a1a", opacity:0.8,
        transform:`rotate(-20 ${bx+8+i*(bw/8.5)} ${by+bh*0.6})` });
      g.appendChild(seed);
    }
  }

  // ── BODY SHINE ──
  const shine = ns("rect");
  attr(shine, { x:bodyX, y:bodyY+1, width:bodyW, height:bodyH*0.22, fill:"rgba(255,255,255,0.18)" });
  svg.appendChild(shine);

  // ── TIP WOOD ──
  const wood = ns("polygon");
  wood.setAttribute("points", `${tipBaseX},${bodyY} ${tipEndX-3},${bodyY+bodyH*0.25} ${tipEndX},${bodyY+bodyH/2} ${tipEndX-3},${bodyY+bodyH*0.75} ${tipBaseX},${bodyY+bodyH}`);
  attr(wood, { fill:"#e8d5b0" });
  svg.appendChild(wood);

  // ── GRAPHITE TIP ──
  const tipEl = ns("polygon");
  tipEl.setAttribute("points", `${tipEndX-6},${bodyY+bodyH*0.35} ${tipEndX},${bodyY+bodyH/2} ${tipEndX-6},${bodyY+bodyH*0.65}`);
  attr(tipEl, { fill:"#333" });
  svg.appendChild(tipEl);

  // ── LABEL ──
  if (bodyW > 40 && !['emoji','rainbow','zebra','bee','watermelon','holographic'].includes(p)) {
    const txt = ns("text");
    attr(txt, { x: bodyX+bodyW/2, y: bodyY+bodyH/2+3.5, "text-anchor":"middle",
      "font-family":"Nunito,sans-serif", "font-weight":"800", "font-size":"7",
      fill: design.accent, opacity:"0.85" });
    txt.textContent = design.name.replace(/[^\x00-\x7F]/g,"").trim().toUpperCase();
    svg.appendChild(txt);
  }

  return svg;
}

// ── Render Tray ──────────────────────────────────────────────────────────────
function renderTray() {
  const row = document.getElementById("trayRow");
  row.innerHTML = "";
  trayPencils.forEach(p => {
    const svg = drawPencil(p.design, p.length, 160, 38);
    svg.classList.add("tray-pencil");
    if (selectedPencil && selectedPencil.id === p.id) svg.classList.add("selected");
    svg.title = p.design.name;
    svg.addEventListener("click", () => selectPencil(p));
    // tooltip
    svg.addEventListener("mouseenter", e => showTooltip(p.design.name, e));
    svg.addEventListener("mousemove", e => moveTooltip(e));
    svg.addEventListener("mouseleave", hideTooltip);
    row.appendChild(svg);
  });
}

// ── Select Pencil ────────────────────────────────────────────────────────────
function selectPencil(p) {
  playClick();
  selectedPencil = p;
  trayPencils = trayPencils.filter(t => t.id !== p.id);

  // auto-refill tray so it never runs dry
  while (trayPencils.length < 3) {
    const design = PENCIL_DESIGNS[Math.floor(Math.random() * PENCIL_DESIGNS.length)];
    trayPencils.push({ id: makePencilId(), design, length: 1.0 });
  }

  renderTray();
  renderStage();
  const btn = document.getElementById("sharpenBtn");
  btn.disabled = false;
  btn.textContent = "⚡ Hold to Sharpen";
  document.getElementById("collectBtn").style.display = "none";
  document.getElementById("progressWrap").style.display = "block";
  document.getElementById("progressFill").style.width = (p.length * 100) + "%";
  setStatus(`${p.design.name} — hold the button to sharpen!`);
}

// ── Hold-to-Sharpen ────────────────────────────────────────────────────────
let holdInterval = null;
let motorNode = null;

function startHold() {
  if (!selectedPencil || isSharpening) return;
  isSharpening = true;

  const btn = document.getElementById("sharpenBtn");
  btn.classList.add("pressing");
  document.getElementById("sharpenerWrap").classList.add("shaking");
  document.getElementById("sharpenerLight").setAttribute("fill", "#39ff14");
  setStatus("Bzzzzzzz! ✨");

  motorNode = startMotorLoop();

  holdInterval = setInterval(() => {
    if (!selectedPencil) { stopHold(); return; }

    selectedPencil.length = Math.max(0.05, selectedPencil.length - 0.009);
    document.getElementById("progressFill").style.width = (selectedPencil.length * 100) + "%";
    renderStage();
    if (Math.random() < 0.6) spawnShaving();

    if (selectedPencil.length <= 0.05) {
      // pencil is fully ground down — stop and force collect
      clearInterval(holdInterval); holdInterval = null;
      isSharpening = false;
      if (motorNode) { try { motorNode.stop(); } catch(e){} motorNode = null; }
      btn.classList.remove("pressing");
      document.getElementById("sharpenerWrap").classList.remove("shaking");
      document.getElementById("sharpenerLight").setAttribute("fill", "#555");
      showCollectPrompt();
    }
  }, 80);
}

function stopHold() {
  if (!isSharpening) return;
  isSharpening = false;
  clearInterval(holdInterval); holdInterval = null;

  if (motorNode) { try { motorNode.stop(); } catch(e){} motorNode = null; }

  const btn = document.getElementById("sharpenBtn");
  btn.classList.remove("pressing");
  document.getElementById("sharpenerWrap").classList.remove("shaking");
  document.getElementById("sharpenerLight").setAttribute("fill", "#555");

  if (!selectedPencil) return;

  // show collect button any time pencil is short enough OR after sharpening
  if (selectedPencil.length <= 0.25) {
    showCollectPrompt();
  } else {
    setStatus("✅ Sharp! Hold to sharpen more, or collect it.");
    document.getElementById("collectBtn").style.display = "";
  }
}

function showCollectPrompt() {
  const btn = document.getElementById("sharpenBtn");
  btn.disabled = false; // keep enabled so they can keep sharpening if they want
  document.getElementById("collectBtn").style.display = "";
  if (selectedPencil && selectedPencil.length <= 0.05) {
    btn.disabled = true;
    setStatus("Totally ground down! Add it to your collection 🏆");
  } else {
    setStatus("Looking sharp! Keep going or collect it 🏆");
  }
  playDone();
}

function startMotorLoop() {
  resumeCtx();
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain = ctx.createGain();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();

  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(82, ctx.currentTime);
  osc2.type = 'square'; osc2.frequency.setValueAtTime(158, ctx.currentTime);
  lfo.type = 'sine'; lfo.frequency.setValueAtTime(14, ctx.currentTime);
  lfoGain.gain.setValueAtTime(14, ctx.currentTime);

  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  osc.connect(gain); osc2.connect(gain);
  gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0.16, ctx.currentTime);

  osc.start(); osc2.start(); lfo.start();

  // return a fake stop handle
  return { stop: () => {
    gain.gain.setValueAtTime(gain.gain.value, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.18);
    osc2.stop(ctx.currentTime + 0.18);
    lfo.stop(ctx.currentTime + 0.18);
  }};
}

function finishPencil() {
  if (!selectedPencil) return;
  playDone();
  const p = selectedPencil;
  collection.push(p);
  saveStub(p);
  selectedPencil = null;

  renderStage();
  renderCollection();

  document.getElementById("progressWrap").style.display = "none";
  document.getElementById("collectBtn").style.display = "none";
  const btn = document.getElementById("sharpenBtn");
  btn.disabled = true;
  btn.textContent = "⚡ Hold to Sharpen";

  setStatus(`🏆 Added to collection!`);
  spawnConfetti();
}

// Wire up hold events after DOM ready
function wireHoldButton() {
  const btn = document.getElementById("sharpenBtn");
  btn.addEventListener("mousedown", e => { e.preventDefault(); startHold(); });
  btn.addEventListener("touchstart", e => { e.preventDefault(); startHold(); }, { passive: false });
  btn.addEventListener("touchend",   e => { e.preventDefault(); stopHold(); }, { passive: false });
  btn.addEventListener("touchcancel",() => stopHold());
}

// ── Render Stage ─────────────────────────────────────────────────────────────
function renderStage() {
  const holder = document.getElementById("pencilHolder");
  const hint = document.getElementById("dropHint");
  holder.querySelectorAll("svg").forEach(e => e.remove());
  if (selectedPencil) {
    hint.style.display = "none";
    const svg = drawPencil(selectedPencil.design, selectedPencil.length, 240, 52);
    holder.insertBefore(svg, holder.querySelector(".shavings-container"));
  } else {
    hint.style.display = "";
  }
}

// ── Shavings ──────────────────────────────────────────────────────────────────
const shavingColors = ["#f5c518","#8b5e3c","#deb887","#c68642","#a0522d","#cd853f"];
function spawnShaving() {
  const container = document.getElementById("shavingsContainer");
  const div = document.createElement("div");
  div.className = "shaving";
  div.style.left = (20 + Math.random() * 60) + "%";
  div.style.background = shavingColors[Math.floor(Math.random() * shavingColors.length)];
  div.style.width = (4 + Math.random() * 5) + "px";
  div.style.height = (3 + Math.random() * 3) + "px";
  div.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
  div.style.animationDuration = (0.5 + Math.random() * 0.4) + "s";
  container.appendChild(div);
  setTimeout(() => div.remove(), 900);
}

// ── Collection ────────────────────────────────────────────────────────────────
function renderCollection() {
  const shelf = document.getElementById("collShelf");
  const empty = document.getElementById("emptyColl");
  const count = document.getElementById("collCount");
  count.textContent = collection.length;

  shelf.querySelectorAll("svg").forEach(e => e.remove());
  if (collection.length === 0) {
    empty.style.display = "";
    return;
  }
  empty.style.display = "none";

  collection.forEach(p => {
    const svg = drawPencil(p.design, Math.min(p.length, 0.35), 80, 32, true);
    svg.classList.add("coll-pencil");
    svg.title = `${p.design.name} stub`;
    svg.addEventListener("mouseenter", e => showTooltip(p.design.name + " stub", e));
    svg.addEventListener("mousemove", e => moveTooltip(e));
    svg.addEventListener("mouseleave", hideTooltip);
    svg.addEventListener("click", () => { playPop(); spawnSparkle(); });
    shelf.appendChild(svg);
  });
}

// ── Confetti ──────────────────────────────────────────────────────────────────
const confettiColors = ["#ff6b35","#ff9f1c","#e63946","#4cc9f0","#7209b7","#f72585","#4361ee","#3a0ca3","#aacc00"];
function spawnConfetti() {
  for (let i = 0; i < 24; i++) {
    const el = document.createElement("div");
    el.className = "confetti-piece";
    el.style.left = (30 + Math.random() * 40) + "vw";
    el.style.top = (30 + Math.random() * 20) + "vh";
    el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    el.style.transform = `rotate(${Math.random()*360}deg)`;
    el.style.animationDelay = Math.random() * 0.3 + "s";
    el.style.animationDuration = (0.8 + Math.random() * 0.6) + "s";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

const sparkleEmojis = ["✨","⭐","🌟","💫","✦","★"];
function spawnSparkle() {
  const el = document.createElement("div");
  el.className = "sparkle";
  el.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
  el.style.left = (20 + Math.random() * 60) + "vw";
  el.style.top = (20 + Math.random() * 40) + "vh";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

// ── Status ────────────────────────────────────────────────────────────────────
let statusTimer;
function setStatus(msg) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.style.animation = "none";
  el.offsetHeight; // reflow
  el.style.animation = "";
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.textContent = "", 3000);
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
const tip = document.getElementById("tooltip");
function showTooltip(text, e) {
  tip.textContent = text;
  tip.style.opacity = "1";
  moveTooltip(e);
}
function moveTooltip(e) {
  tip.style.left = (e.clientX + 12) + "px";
  tip.style.top = (e.clientY - 28) + "px";
}
function hideTooltip() { tip.style.opacity = "0"; }

// ── IndexedDB Persistence ──────────────────────────────────────────────────
const DB_NAME = 'SharpenIt', DB_VERSION = 1, STORE = 'stubs';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror   = e => reject(e.target.error);
  });
}

function saveStub(p) {
  if (!db) return;
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).put({ id: p.id, design: p.design, length: p.length });
}

function loadStubs() {
  return new Promise((resolve, reject) => {
    if (!db) return resolve([]);
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = e => resolve(e.target.result || []);
    req.onerror   = e => reject(e.target.error);
  });
}

function clearAllStubs() {
  if (!db) return;
  const tx = db.transaction(STORE, 'readwrite');
  tx.objectStore(STORE).clear();
  collection = [];
  renderCollection();
  setStatus('Collection cleared! Fresh start 🧹');
}

// ── Init ───────────────────────────────────────────────────────────────────────
openDB().then(async () => {
  // load saved stubs first
  const saved = await loadStubs();
  if (saved.length > 0) {
    collection = saved;
    renderCollection();
    setStatus(`Welcome back! ${saved.length} stub${saved.length > 1 ? 's' : ''} in your collection 🏆`);
  }
  // start with 3 pencils in tray
  addRandomPencil();
  addRandomPencil();
  addRandomPencil();
  wireHoldButton();
  document.addEventListener("mouseup", () => stopHold());
}).catch(() => {
  // fallback if IndexedDB unavailable
  addRandomPencil();
  addRandomPencil();
  addRandomPencil();
  wireHoldButton();
  document.addEventListener("mouseup", () => stopHold());
});
</script>
